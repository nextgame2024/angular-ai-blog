<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <title>sophiaAi</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      id="prime-icons"
      rel="stylesheet"
      href="assets/primeicons/primeicons.css"
    />
    <script>
      (() => {
        try {
          const mode = localStorage.getItem('sophiaAi.theme');
          document.documentElement.classList.toggle('dark', mode !== 'light');
          document.documentElement.style.colorScheme =
            mode === 'light' ? 'light' : 'dark';
        } catch {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2F1P9NXNYC"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-2F1P9NXNYC');
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
