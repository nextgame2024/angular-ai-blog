<div class="min-h-screen flex flex-col">
  <mc-topbar></mc-topbar>
  <main class="flex-1">
    <router-outlet></router-outlet>
  </main>
  <mc-footer></mc-footer>
</div>

@if (analytics.consent$$() === null) {
  <section
    class="fixed inset-x-3 bottom-3 z-[1000] mx-auto max-w-3xl rounded-lg border border-slate-200 bg-white p-4 shadow-2xl dark:border-slate-700 dark:bg-slate-950"
    aria-label="Cookie consent"
  >
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h2 class="text-sm font-bold text-slate-950 dark:text-white">
          Cookie preferences
        </h2>
        <p class="mt-1 text-xs leading-5 text-slate-600 dark:text-slate-300">
          We use analytics cookies to understand which toolkit recipes and pages
          help users most.
        </p>
      </div>
      <div class="flex shrink-0 gap-2">
        <button
          type="button"
          class="rounded-md border border-slate-300 px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 dark:border-slate-700 dark:text-slate-200 dark:hover:bg-slate-900"
          (click)="rejectAnalytics()"
        >
          Decline
        </button>
        <button
          type="button"
          class="rounded-md bg-gradient-to-r from-cyan-400 to-violet-600 px-4 py-2 text-sm font-bold text-white transition hover:brightness-105"
          (click)="acceptAnalytics()"
        >
          Accept
        </button>
      </div>
    </div>
  </section>
}
